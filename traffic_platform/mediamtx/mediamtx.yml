# MediaMTX template for the Traffic Event platform.
# The platform backend generates traffic_platform/runtime/mediamtx.yml from the
# current DealRCF.cfg before starting MediaMTX.

logLevel: info
logDestinations: [stdout]

# 8554 is used by the algorithm's boxed RTSP pusher, so MediaMTX uses 8555.
rtsp: yes
rtspAddress: :8555

rtmp: no
hls: no

webrtc: yes
webrtcAddress: :8889

srt: no

paths:
  boxed:
    source: publisher

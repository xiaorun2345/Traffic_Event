# 视觉行人预警主进程配置模板
# 使用方法：
#   cp config/DealRCF.example.cfg config/DealRCF.cfg
#   然后按现场环境填写 RTSP、UDP、LED 等参数。

name = "camera_person_warning"

node =
{
	CameraConfig = "../config/camera_config_lane.cfg";
	SendSensorType = 2; # 固定视觉模式
	SendModel = 0;
	PortName = "/dev/ttyS6";
	BaudRate = 57600;

	RsuIp = "192.168.0.100";
	RsuPort = 30088;
	CloudIp = "192.168.0.101";
	CloudPort = 20000;

	# 请勿提交真实账号密码到仓库
	CameraURI = "rtsp://USER:PASSWORD@CAMERA_IP:554/Streaming/Channels/102";

	CameraShow = 1; # 1显示窗口，4推流，其它按代码定义
	RtspPushPort = 8554; # 带框RTSP推流端口
	RtspOutputWidth = 1280; # 平台预览推流宽度
	RtspOutputHeight = 720; # 平台预览推流高度
	IsSaveData = 0;
	SendTime = 1000; # 上报周期，单位毫秒

	LedWarningText = "您已超速，请减速慢行";
	LedIp = "192.168.0.102";
	LedPort = 30080;
	LedSdkKey = "";
	LedSdkSecret = "";
	LedDeviceId = "";

	ListenPadPort = 10020;
	IsPadDebug = 0;

	CameraLength = 1920;
	CameraWidth = 1080;

	location_angle = 190.38;
	location_longitude = 118.00000000;
	location_latitude = 28.00000000;
	IsGcj02 = 1;

	GetMatMode = 0;
	RtspTransport = "tcp"; # tcp/udp/multicast，默认 tcp 更稳定
	SourceTimeoutSec = 10;
	ReconnectTimes = 0; # <=0 表示一直重连，>0 表示最大重连次数
}

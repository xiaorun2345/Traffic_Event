name = "camera configuration file"
version = "version1.0.0"

gie = {
    #模型名称, 注意路径, 必须配置
    #model_engine_file = "./weights/trans_up.rknn"; 
    model_engine_file = "./weights/sb.rknn"; 
    #model_engine_file = "./weights/c2f_cssb.rknn"; 
    # model_engine_file = "./weights/sb_960.rknn"; 
    #model_engine_file = "./weights/yolov5s_best.rknn"; 
    #model_engine_file = "./weights/add_layer.rknn"; 

    #检测目标类别名称列表文件, 必须配置
   # sb.rknn输出通道为33 = 3 * (5 + 6)，类别数必须配置为6
   class_names = "car;bus;truck;person;motorbike;tricycle";  


    ###量化精度， 不需要修改
    #### 0=INT8, 1=FP16  2=FP32 mode ####
    network_mode = 0;

    idx_npu = 4;  # 0:0     1:1     2:2     3:0_1   4:0_1_2

    #nms阈值
    nms_iou_threshold = "0.5";
    
    #目标置信度阈值。当前模型0.35仍会打满64个输出，现场按0.65强过滤误检
    pre-cluster-threshold = "0.65";
    
};

tracker = {
    #最低阈值, 必须配置
    low_thresh = "0.5";
    #最高阈值, 必须配置
    high_thresh = "0.7";
    #行人创建跟踪的阈值，误检多时需要高于检测阈值
    high_thresh_person = "0.55";
    #非机动车创建跟踪的阈值
    high_thresh_motorbike = "0.65";
    #iou匹配的阈值, 必须配置
    max_iou_thresh = "0.8";
};

location = {
    #是否开启定位模块 0 or 1
    enable = 1;

    #标定文件
    calibration_file = "../config/cfg.json";

    #滤波相关阈值, 必须配置
    std_measurement_x = "0.1";
    std_measurement_y = "0.1";
    std_state_ax = "0.4";
    std_state_ay = "0.5";

    #速度阈值, 必须配置
    speed_thresh = "2.5";
    #速度收敛阈值, 必须配置
    speed_converged_thresh = "1.5";

    #初始航向角
    heading = "175.00";

    #摄像机安装位置与正北方向交角, 安装位置的经度, 纬度
    camera_location_angle = "355.00";
    camera_location_longitude = "112.946004004";
    camera_location_latitude = "28.244091551";
    camera_location_elevation = "0";
};

NL_config = {
    #设备ID
    camera_device_id = "camera1";

    #汉字文件
    font_file = "../config/simhei.ttf";

    #摄像机ROI区域,必须顺时针选取至少4个点
    roi = (
        {
            #roi_points = "2;1072;6;766;106;704;256;714;472;576;898;576;994;698;1082;786;1020;846;1102;948;1152;1062";
            #roi_points = "90;1066;220;352;1022;308;1247;511;1446;873;1542;1071";
            #roi_points = "451;181;668;145;868;243;1193;478;1680;1063;90;1065;478;379;488;268";
            roi_points = "0;0;2559;0;2559;1439;0;1439";
        },
        #{
        #    roi_points = "10;10;600;10;600;600;10;600";
        #}
    );

};
